name: CI

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    # Force bash on every OS so Git Bash is used on Windows, not PowerShell.
    shell: bash

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies (ubuntu)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Verify dependencies (macos)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          # macOS runners ship with jq preinstalled; shellcheck is available via brew.
          if ! command -v jq >/dev/null 2>&1; then
            brew install jq
          fi
          if ! command -v shellcheck >/dev/null 2>&1; then
            brew install shellcheck
          fi

      - name: Install dependencies (windows)
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail
          # GitHub-hosted Windows runners come with chocolatey + jq preinstalled.
          # Just make sure shellcheck is available; install if missing.
          if ! command -v shellcheck >/dev/null 2>&1; then
            choco install shellcheck -y --no-progress
          fi

      - name: Show tool versions
        run: |
          set -euo pipefail
          bash --version | head -1
          jq --version
          shellcheck --version | head -2
          uname -s

      - name: Collect shell files
        id: shfiles
        run: |
          set -euo pipefail
          files=()
          # Top-level scripts + the CLI entry points (claude-state is the
          # real CLI in v0.4+; claude-handoff stays as a deprecation shim).
          for f in install.sh uninstall.sh bin/claude-state bin/claude-handoff; do
            if [ -f "$f" ]; then
              files+=("$f")
            fi
          done
          # Sourced helper libs — flat under lib/.
          if [ -d lib ]; then
            while IFS= read -r -d '' file; do
              files+=("$file")
            done < <(find lib -maxdepth 1 -type f -name '*.sh' -print0)
          fi
          # Hook + subcommand modules — modules/<feature>/*.sh.
          if [ -d modules ]; then
            while IFS= read -r -d '' file; do
              files+=("$file")
            done < <(find modules -mindepth 2 -maxdepth 2 -type f -name '*.sh' -print0)
          fi
          # Test files (top-level only; the suite has no nested *.sh).
          if [ -d tests ]; then
            while IFS= read -r -d '' file; do
              files+=("$file")
            done < <(find tests -maxdepth 1 -type f -name '*.sh' -print0)
          fi
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell files found." >&2
            exit 1
          fi
          printf '%s\n' "${files[@]}"
          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: bash -n syntax check
        run: |
          set -euo pipefail
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "bash -n $f"
            bash -n "$f"
          done <<< "${{ steps.shfiles.outputs.files }}"

      - name: shellcheck
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r f; do
            [ -n "$f" ] && files+=("$f")
          done <<< "${{ steps.shfiles.outputs.files }}"
          shellcheck "${files[@]}"

      - name: Validate JSON (settings.example.json)
        run: jq -e . settings.example.json > /dev/null

      - name: Validate JSON (settings.example.auto.json)
        run: jq -e . settings.example.auto.json > /dev/null

      - name: Run test suite
        run: bash tests/run-all.sh
