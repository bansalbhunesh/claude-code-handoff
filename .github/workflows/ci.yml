name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies (ubuntu)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Verify dependencies (macos)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          # macOS runners ship with jq preinstalled; shellcheck is available via brew.
          if ! command -v jq >/dev/null 2>&1; then
            brew install jq
          fi
          if ! command -v shellcheck >/dev/null 2>&1; then
            brew install shellcheck
          fi

      - name: Show tool versions
        run: |
          set -euo pipefail
          bash --version
          jq --version
          shellcheck --version

      - name: Collect shell files
        id: shfiles
        run: |
          set -euo pipefail
          files=()
          for f in install.sh uninstall.sh bin/claude-handoff; do
            if [ -f "$f" ]; then
              files+=("$f")
            fi
          done
          for d in scripts tests; do
            if [ -d "$d" ]; then
              while IFS= read -r -d '' file; do
                files+=("$file")
              done < <(find "$d" -maxdepth 1 -type f -name '*.sh' -print0)
            fi
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell files found." >&2
            exit 1
          fi
          printf '%s\n' "${files[@]}"
          {
            echo 'files<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: bash -n syntax check
        run: |
          set -euo pipefail
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "bash -n $f"
            bash -n "$f"
          done <<< "${{ steps.shfiles.outputs.files }}"

      - name: shellcheck
        run: |
          set -euo pipefail
          # Build args portably (no mapfile -- macOS ships bash 3.2).
          files=()
          while IFS= read -r f; do
            [ -n "$f" ] && files+=("$f")
          done <<< "${{ steps.shfiles.outputs.files }}"
          shellcheck "${files[@]}"

      - name: Validate JSON (settings.example.json)
        run: jq -e . settings.example.json > /dev/null

      - name: Validate JSON (settings.example.auto.json)
        run: jq -e . settings.example.auto.json > /dev/null

      - name: Run test suite
        run: bash tests/run-all.sh
